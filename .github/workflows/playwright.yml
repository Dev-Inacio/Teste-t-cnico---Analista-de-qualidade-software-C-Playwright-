name: Testes - MinhasFinancas

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  unit-frontend:
    name: Unitários Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Instalar dependências
        run: npm ci
        working-directory: unit/MinhasFinancas.Testes/FrontEnd
      - name: Rodar testes unitários frontend
        run: npm test
        working-directory: unit/MinhasFinancas.Testes/FrontEnd

  unit-backend:
    name: Unitários Backend (xUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Rodar testes unitários backend
        run: dotnet test
        working-directory: unit/MinhasFinancas.Testes/Backend/MinhasFinancas.Testes

  integration:
    name: Integração (xUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Rodar testes de integração
        run: dotnet test
        working-directory: integration/MinhasFinancas.IntegrationTestes

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Instalar dependências
        run: npm ci
        working-directory: e2e
      - name: Instalar Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: e2e
      - name: Rodar testes E2E
        run: npx playwright test
        working-directory: e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30